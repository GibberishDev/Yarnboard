<!DOCTYPE html>
<head>
    <title>Yarnboard</title>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="icon" href="../../assets/svg/icon.svg">
    <script defer src="../js/app_titlebar_controls.js"></script>
</head>
<body>
    <title-bar>
        <div id="app-icon"><img src="../../assets/svg/icon.svg" alt="icon"></div>
        <div id="title-bar-label">Yarnboard</div>
        <div id="title-bar-controls">
            <div title="Miminize window" id="button-minimize" class="title-bar-button"><img src="../../assets/svg/minimize.svg" alt=""></div>
            <div title="Maximize window" id="button-maximize" class="title-bar-button"><img src="../../assets/svg/maximize.svg" alt=""></div>
            <div title="Close window" id="button-close" class="title-bar-button"><img src="../../assets/svg/close.svg" alt=""></div>
        </div>
    </title-bar>
    <tab-bar></tab-bar>
    <main-body>
        <link rel="stylesheet" href="../css/project_list.css">
        <project-list>
            <div id="splash-art"><img src="../../assets/png/test_splash_art.png" alt=""></div>
            <div id="project-control"></div>
            <div id="recents"></div>
        </project-list>
    </main-body>
</body>
</html>
