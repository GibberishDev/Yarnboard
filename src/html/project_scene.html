<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../css/project_scene.css">

    <script defer src="../js/global/current_project_control.js"></script>
    <script defer src="../js/global/animation_util.js"></script>

    
    <link rel="stylesheet" href="../css/element_styles/photo-element.css">
    
    <script src="../js/element_scripts/photo_element_control.js"></script>
    </script>
</head>
<body>
    <div id="project-scene-body">
            
        <div id="loading-splash-container">
            <div id="loading-splash">
                <div id="loading-label">Project %project.name% is loading...</div>
                <div id="loading-text">Loading photo elements (14/25)</div>
                <div id="loading-progress"></div>
                <div id="loading-spinner"></div>
            </div>
        </div>
        
        <div class="board" id="board">
            <div id="board-background"></div>
            <div id="board-elements"></div>
            <div id="board-hud">
                <div id="board-zoom-indicator" class="indicator">1.0x</div>
                <div id="board-cords-indicator" class="indicator">0x : 0y</div>
            </div>
        </div>
    </div>
</body>
</html>
